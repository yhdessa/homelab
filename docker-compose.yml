services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: reverse_proxy
    ports:
      - "80:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      flweb:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=10m
      - /var/run:size=5m
      - /var/log/nginx:size=10m
    cpus: 0.5 
    mem_limit: 128M
    mem_reservation: 64M
    networks:
      - app-network
    restart: unless-stopped

  flweb:
    build: .
    container_name: flask_app
    command:
      [
        "gunicorn",
        "--bind",
        "0.0.0.0:5000",
        "--workers",
        "2",
        "--threads",
        "4",
        "--timeout",
        "30",
        "--worker-tmp-dir",
        "/tmp",
        "--pid",
        "/tmp/gunicorn.pid",
        "--access-logfile",
        "-",
        "sc:app",
      ]
    environment:
      DB_HOST: ${DB_HOST:-db_web}
      DB_USER: ${DB_USER:?DB_USER is required in .env}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required in .env}
      DB_NAME: ${DB_NAME:?DB_NAME is required in .env}
      DEBUG: ${DEBUG:-False}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      TMPDIR: /tmp
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /var/run
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
          pids: 150
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:8-alpine
    container_name: redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    security_opt:
      - no-new-privileges:true
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s
    restart: unless-stopped
  
  prometheus:
    image: prom/prometheus:v3.5.0
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - 9090:9090
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus

  db:
    build:
      context: .
      dockerfile: postgres/Dockerfile
    container_name: db_web
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required in .env}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required in .env}
    security_opt:
      - no-new-privileges:true
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep postgres || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
