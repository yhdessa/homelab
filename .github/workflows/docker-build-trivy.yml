name: CI - Lint, Build, Scan & Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'app/src/**.py'
              - 'app/requirements.txt'
              - 'tests/**'

  lint:
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort bandit safety

      - name: Lint with flake8
        run: flake8 app/src

      - name: Format check with black
        run: black --check app/src || true

      - name: Import sorting with isort
        run: isort --check-only app/src

      - name: Security scan with bandit
        run: bandit -r app/src

      - name: Dependency safety check
        run: safety check --full-report || true

  build-scan-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          load: true
          tags: temp-app-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan app image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'temp-app-image:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          timeout: 10m

      - name: Push app image to GHCR
        if: success()
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/app:latest
            ghcr.io/${{ github.repository }}/app:${{ github.sha }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('ghcr.io/{0}/app:{1}', github.repository, github.ref_name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Trivy report (app)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-app
          path: trivy-report.*
          retention-days: 7

  build-scan-nginx:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Nginx image
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: false
          load: true
          tags: temp-nginx-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Nginx image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'temp-nginx-image:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          timeout: 10m
          secret-ignore-path: '/etc/nginx/certs/selfsigned.key'

      - name: Push Nginx image to GHCR
        if: success() && (github.event_name == 'push' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/nginx:latest
            ghcr.io/${{ github.repository }}/nginx:${{ github.sha }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('ghcr.io/{0}/nginx:{1}', github.repository, github.ref_name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Trivy report (nginx)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-nginx
          path: trivy-report.*
          retention-days: 7
