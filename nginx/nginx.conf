events {
    worker_connections 1024;
}

http {
    server_tokens off;

    log_format json_combined escape=json
        '{ "time": "$time_iso8601", "remote_addr": "$remote_addr", "request_method": "$request_method", '
        '"request_uri": "$request_uri", "status": $status, "bytes_sent": $bytes_sent, '
        '"http_referer": "$http_referer", "http_user_agent": "$http_user_agent", '
        '"request_time": $request_time, "upstream_response_time": "$upstream_response_time" }';

    access_log /dev/stdout json_combined;
    error_log /dev/stderr warn;

    client_max_body_size 10m;

    limit_req_zone $http_x_forwarded_for zone=global_limit:10m rate=10r/s;
    limit_req_status 429;

    limit_conn_zone $http_x_forwarded_for zone=conn_limit_per_ip:10m;

    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl default_server;
        http2 on;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;

        ssl_protocols TLSv1.3 TLSv1.2;
        ssl_prefer_server_ciphers off;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        limit_conn conn_limit_per_ip 20;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        limit_req zone=global_limit burst=20 nodelay;

        location / {
            proxy_pass http://flweb:5000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        }

        location /nginx_status {
            stub_status;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }
    }
}
