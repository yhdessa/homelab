[loggers]
keys=root,access

[handlers]
keys=console

[formatters]
keys=json

[logger_root]
level=INFO
handlers=console

[logger_access]
level=INFO
handlers=console
qualname=gunicorn.access
propagate=0

[handler_console]
class=StreamHandler
formatter=json
stream=ext://sys.stdout

[formatter_json]
class=pythonjsonlogger.jsonlogger.JsonFormatter
format=%(asctime)s %(levelname)s %(name)s %(message)s %(process)d %(thread)d %(remote_addr)s %(request)s %(status)s %(byte)s %(referer)s %(user_agent)s
datefmt=%Y-%m-%d %H:%M:%S %z
json_ensure_ascii=false
